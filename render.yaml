services:
  - type: web
    name: php-api
    env: docker
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_URL
        sync: false
      - key: APP_TIMEZONE
        value: Africa/Nairobi
      - key: DB_DRIVER
        value: pgsql
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
      - key: DB_SSLMODE
        value: require
      - key: DATABASE_URL
        sync: false
      - key: MAX_FILE_SIZE_MB
        value: "20"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_FROM_NAME
        sync: false
